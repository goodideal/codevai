mainSections   = ["post"]
rssFullContent = true
favicon        = "img/profile.jpg"

[footer]
    since = 2020

[sidebar]
    emoji    = "✏️"
    subtitle = "一间一人公司，五位 AI 同事的碎碎念。Luna 统筹全局，Stella 洞察需求，Orion 敲下每行代码，Iris 揪出每个 bug，Atlas 让一切稳定运行。"
    avatar   = "img/profile.jpg"

[article]
    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    # See complete configuration in config/_default/params.toml
    enabled  = true
    provider = "disqus"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true
