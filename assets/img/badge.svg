<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="44%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#1a1740"/>
      <stop offset="100%" stop-color="#07051a"/>
    </radialGradient>
    <radialGradient id="moonSurface" cx="32%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="42%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="48%"  stop-color="#f0ebff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="moonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame">
      <rect width="400" height="400" rx="52"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Background -->
    <rect width="400" height="400" fill="url(#bg)"/>

    <!-- Ambient aurora -->
    <ellipse cx="188" cy="148" rx="178" ry="82" fill="#3b0764" opacity="0.07"/>
    <ellipse cx="196" cy="140" rx="122" ry="54" fill="#4c1d95" opacity="0.08"/>

    <!-- Stars -->
    <circle cx="52"  cy="66"  r="1.5" fill="white"   opacity="0.75"/>
    <circle cx="105" cy="44"  r="1"   fill="white"   opacity="0.50"/>
    <circle cx="288" cy="50"  r="1.2" fill="#e0d7ff" opacity="0.65"/>
    <circle cx="358" cy="80"  r="1"   fill="white"   opacity="0.45"/>
    <circle cx="70"  cy="115" r="1"   fill="white"   opacity="0.50"/>
    <circle cx="336" cy="128" r="1.5" fill="white"   opacity="0.55"/>
    <circle cx="48"  cy="308" r="1"   fill="#c4b5fd" opacity="0.45"/>
    <circle cx="356" cy="322" r="1.2" fill="white"   opacity="0.38"/>
    <circle cx="78"  cy="362" r="1"   fill="white"   opacity="0.35"/>
    <circle cx="348" cy="372" r="1.5" fill="#a78bfa" opacity="0.40"/>
    <circle cx="270" cy="74"  r="1"   fill="white"   opacity="0.45"/>
    <circle cx="42"  cy="188" r="1"   fill="#c4b5fd" opacity="0.35"/>
    <circle cx="362" cy="200" r="1.2" fill="white"   opacity="0.30"/>

    <!-- Orbit ellipse (tilted -20° around moon center) -->
    <ellipse cx="195" cy="151" rx="116" ry="48" fill="none"
             stroke="#6d28d9" stroke-width="1.2" opacity="0.36"
             transform="rotate(-20, 195, 151)"/>

    <!-- Moon aura layers -->
    <circle cx="188" cy="150" r="92" fill="#7c3aed" opacity="0.05"/>
    <circle cx="188" cy="150" r="74" fill="#6d28d9" opacity="0.07"/>

    <!-- Moon body -->
    <circle cx="188" cy="150" r="65" fill="url(#moonSurface)" filter="url(#moonGlow)"/>
    <!-- Crescent shadow -->
    <circle cx="215" cy="136" r="55" fill="#07051a"/>

    <!-- Crescent surface texture (craters) -->
    <circle cx="160" cy="166" r="7"   fill="none" stroke="#c4b5fd" stroke-width="0.7" opacity="0.20"/>
    <circle cx="147" cy="140" r="4.5" fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.16"/>
    <circle cx="172" cy="194" r="5.5" fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.14"/>

    <!-- Orbiting node — the "Co" (human + AI in constant motion) -->
    <circle cx="287" cy="106" r="14" fill="#a78bfa" filter="url(#sparkGlow)" opacity="0.88"/>
    <circle cx="287" cy="106" r="7"  fill="#f8f5ff"/>
    <circle cx="287" cy="106" r="18" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.28"/>

    <!-- Trail particles (motion vector) -->
    <circle cx="303" cy="117" r="4"   fill="#7c3aed" opacity="0.30"/>
    <circle cx="314" cy="132" r="2.8" fill="#5b21b6" opacity="0.20"/>
    <circle cx="320" cy="148" r="1.8" fill="#4c1d95" opacity="0.14"/>

    <!-- Wordmark: "Co" light + "DevAI" bold -->
    <text x="200" y="286"
          font-family="'Helvetica Neue', 'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="44" fill="url(#wordmark)"
          text-anchor="middle" letter-spacing="0.5">
      <tspan font-weight="300">Co</tspan><tspan font-weight="700">DevAI</tspan>
    </text>

    <!-- Tagline -->
    <text x="200" y="322"
          font-family="'Helvetica Neue', 'Inter', Arial, sans-serif"
          font-size="9.5" font-weight="400" letter-spacing="4.5"
          fill="#7c3aed" text-anchor="middle" opacity="0.72">
      THINK SMALL · BUILD GREAT
    </text>
  </g>

  <!-- Outer border -->
  <rect width="400" height="400" fill="none"
        stroke="#2e1d6e" stroke-width="1.5" rx="52" opacity="0.65"/>
</svg>
