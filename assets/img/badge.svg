<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#080818"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Badge background -->
  <circle cx="250" cy="250" r="245" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="250" cy="250" r="244" fill="none" stroke="url(#accent)" stroke-width="4"/>

  <!-- Inner decorative ring -->
  <circle cx="250" cy="250" r="228" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>

  <!-- Hexagon frame -->
  <polygon points="250,72 398,161 398,339 250,428 102,339 102,161"
           fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.15"/>

  <!-- Top neural net (5 nodes = 5 AI teammates) -->
  <line x1="148" y1="138" x2="192" y2="112" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <line x1="192" y1="112" x2="250" y2="125" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <line x1="250" y1="125" x2="308" y2="112" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <line x1="308" y1="112" x2="352" y2="138" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <line x1="148" y1="138" x2="250" y2="125" stroke="#6366f1" stroke-width="0.8" opacity="0.25"/>
  <line x1="352" y1="138" x2="250" y2="125" stroke="#6366f1" stroke-width="0.8" opacity="0.25"/>
  <circle cx="148" cy="138" r="7" fill="#38bdf8" filter="url(#glow)" opacity="0.9"/>
  <circle cx="192" cy="112" r="5" fill="#818cf8" opacity="0.85"/>
  <circle cx="250" cy="125" r="7" fill="#38bdf8" filter="url(#glow)" opacity="0.9"/>
  <circle cx="308" cy="112" r="5" fill="#818cf8" opacity="0.85"/>
  <circle cx="352" cy="138" r="7" fill="#38bdf8" filter="url(#glow)" opacity="0.9"/>

  <!-- Code bracket left -->
  <text x="58" y="290" font-family="'Courier New', monospace" font-size="90"
        fill="#6366f1" opacity="0.55" font-weight="bold">&lt;</text>

  <!-- Code bracket right -->
  <text x="308" y="290" font-family="'Courier New', monospace" font-size="90"
        fill="#6366f1" opacity="0.55" font-weight="bold">/&gt;</text>

  <!-- Main brand name -->
  <text x="250" y="268"
        font-family="'Arial Black', 'Arial Bold', sans-serif"
        font-size="74" font-weight="900"
        fill="url(#textGrad)"
        text-anchor="middle"
        letter-spacing="-1"
        filter="url(#glow)">CoDevAI</text>

  <!-- Tagline -->
  <text x="250" y="308"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#38bdf8"
        text-anchor="middle"
        letter-spacing="7"
        opacity="0.75">AI · TEAM</text>

  <!-- Bottom neural net (mirror of top) -->
  <line x1="148" y1="362" x2="192" y2="388" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <line x1="192" y1="388" x2="250" y2="375" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <line x1="250" y1="375" x2="308" y2="388" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <line x1="308" y1="388" x2="352" y2="362" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <line x1="148" y1="362" x2="250" y2="375" stroke="#6366f1" stroke-width="0.8" opacity="0.25"/>
  <line x1="352" y1="362" x2="250" y2="375" stroke="#6366f1" stroke-width="0.8" opacity="0.25"/>
  <circle cx="148" cy="362" r="7" fill="#38bdf8" filter="url(#glow)" opacity="0.9"/>
  <circle cx="192" cy="388" r="5" fill="#818cf8" opacity="0.85"/>
  <circle cx="250" cy="375" r="7" fill="#38bdf8" filter="url(#glow)" opacity="0.9"/>
  <circle cx="308" cy="388" r="5" fill="#818cf8" opacity="0.85"/>
  <circle cx="352" cy="362" r="7" fill="#38bdf8" filter="url(#glow)" opacity="0.9"/>

  <!-- Cardinal tick marks on outer ring -->
  <line x1="250" y1="6"  x2="250" y2="22"  stroke="#38bdf8" stroke-width="2.5" opacity="0.5"/>
  <line x1="250" y1="478" x2="250" y2="494" stroke="#38bdf8" stroke-width="2.5" opacity="0.5"/>
  <line x1="6"   y1="250" x2="22"   y2="250" stroke="#38bdf8" stroke-width="2.5" opacity="0.5"/>
  <line x1="478" y1="250" x2="494" y2="250" stroke="#38bdf8" stroke-width="2.5" opacity="0.5"/>
</svg>
