<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <radialGradient id="gbg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1740"/>
      <stop offset="100%" stop-color="#07051a"/>
    </radialGradient>
    <filter id="gglow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="280" fill="url(#gbg)" rx="12"/>

  <!-- === Feb 5 column === -->
  <text x="90" y="38" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        fill="#5b21b6" letter-spacing="1" opacity="0.7">2026-02-05</text>

  <!-- Single node -->
  <circle cx="90" cy="140" r="16" fill="#a78bfa" filter="url(#gglow)" opacity="0.9"/>
  <circle cx="90" cy="140" r="8"  fill="#f5f0ff"/>

  <text x="90" y="185" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#7c3aed" opacity="0.8">123 tokens</text>
  <text x="90" y="200" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#5b21b6" opacity="0.5">1 session</text>

  <!-- Arrow -->
  <line x1="118" y1="140" x2="165" y2="140" stroke="#4c1d95" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <polygon points="163,136 171,140 163,144" fill="#4c1d95" opacity="0.4"/>

  <!-- === Feb 28 column === -->
  <text x="280" y="38" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        fill="#5b21b6" letter-spacing="1" opacity="0.7">2026-02-28</text>

  <!-- Multiple nodes -->
  <circle cx="230" cy="110" r="9" fill="#8b5cf6" filter="url(#sglow)" opacity="0.80"/>
  <circle cx="270" cy="90"  r="8" fill="#7c3aed" filter="url(#sglow)" opacity="0.75"/>
  <circle cx="310" cy="115" r="9" fill="#8b5cf6" filter="url(#sglow)" opacity="0.80"/>
  <circle cx="250" cy="148" r="10" fill="#a78bfa" filter="url(#sglow)" opacity="0.85"/>
  <circle cx="300" cy="160" r="8" fill="#7c3aed" filter="url(#sglow)" opacity="0.75"/>
  <circle cx="270" cy="185" r="9" fill="#8b5cf6" filter="url(#sglow)" opacity="0.78"/>
  <!-- connections -->
  <line x1="230" y1="110" x2="270" y2="90"  stroke="#6d28d9" stroke-width="0.8" opacity="0.3"/>
  <line x1="270" y1="90"  x2="310" y2="115" stroke="#6d28d9" stroke-width="0.8" opacity="0.3"/>
  <line x1="250" y1="148" x2="230" y2="110" stroke="#6d28d9" stroke-width="0.8" opacity="0.28"/>
  <line x1="250" y1="148" x2="300" y2="160" stroke="#6d28d9" stroke-width="0.8" opacity="0.28"/>
  <line x1="300" y1="160" x2="270" y2="185" stroke="#6d28d9" stroke-width="0.8" opacity="0.28"/>
  <line x1="270" y1="90"  x2="250" y2="148" stroke="#5b21b6" stroke-width="0.6" opacity="0.22"/>
  <line x1="310" y1="115" x2="300" y2="160" stroke="#5b21b6" stroke-width="0.6" opacity="0.22"/>

  <text x="280" y="225" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#7c3aed" opacity="0.8">~40k tokens/day</text>
  <text x="280" y="242" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#5b21b6" opacity="0.5">6 agents · 3 nodes</text>

  <!-- Arrow -->
  <line x1="338" y1="140" x2="385" y2="140" stroke="#4c1d95" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <polygon points="383,136 391,140 383,144" fill="#4c1d95" opacity="0.4"/>

  <!-- === Mar 1 column === -->
  <text x="580" y="38" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        fill="#5b21b6" letter-spacing="1" opacity="0.7">2026-03-01</text>

  <!-- Dense network -->
  <circle cx="450" cy="95"  r="7" fill="#6d28d9" opacity="0.70" filter="url(#sglow)"/>
  <circle cx="490" cy="75"  r="6" fill="#7c3aed" opacity="0.65"/>
  <circle cx="530" cy="95"  r="7" fill="#6d28d9" opacity="0.70"/>
  <circle cx="570" cy="80"  r="6" fill="#5b21b6" opacity="0.62"/>
  <circle cx="610" cy="100" r="7" fill="#7c3aed" opacity="0.68"/>
  <circle cx="650" cy="85"  r="5" fill="#6d28d9" opacity="0.60"/>
  <circle cx="460" cy="135" r="8" fill="#8b5cf6" opacity="0.75" filter="url(#sglow)"/>
  <circle cx="510" cy="128" r="7" fill="#7c3aed" opacity="0.70"/>
  <circle cx="555" cy="140" r="8" fill="#8b5cf6" opacity="0.75"/>
  <circle cx="600" cy="130" r="6" fill="#6d28d9" opacity="0.65"/>
  <circle cx="640" cy="145" r="7" fill="#7c3aed" opacity="0.68"/>
  <circle cx="680" cy="130" r="5" fill="#5b21b6" opacity="0.58"/>
  <circle cx="470" cy="175" r="7" fill="#6d28d9" opacity="0.68"/>
  <circle cx="515" cy="170" r="6" fill="#7c3aed" opacity="0.65"/>
  <circle cx="560" cy="180" r="7" fill="#6d28d9" opacity="0.68"/>
  <circle cx="605" cy="172" r="6" fill="#5b21b6" opacity="0.62"/>
  <circle cx="648" cy="182" r="7" fill="#7c3aed" opacity="0.65"/>
  <circle cx="690" cy="170" r="5" fill="#6d28d9" opacity="0.55"/>
  <!-- connections (selective) -->
  <line x1="450" y1="95"  x2="490" y2="75"  stroke="#5b21b6" stroke-width="0.6" opacity="0.22"/>
  <line x1="490" y1="75"  x2="530" y2="95"  stroke="#5b21b6" stroke-width="0.6" opacity="0.22"/>
  <line x1="530" y1="95"  x2="570" y2="80"  stroke="#5b21b6" stroke-width="0.6" opacity="0.20"/>
  <line x1="570" y1="80"  x2="610" y2="100" stroke="#5b21b6" stroke-width="0.6" opacity="0.20"/>
  <line x1="460" y1="135" x2="450" y2="95"  stroke="#5b21b6" stroke-width="0.6" opacity="0.20"/>
  <line x1="460" y1="135" x2="510" y2="128" stroke="#5b21b6" stroke-width="0.6" opacity="0.20"/>
  <line x1="510" y1="128" x2="555" y2="140" stroke="#5b21b6" stroke-width="0.6" opacity="0.20"/>
  <line x1="555" y1="140" x2="600" y2="130" stroke="#5b21b6" stroke-width="0.6" opacity="0.18"/>
  <line x1="600" y1="130" x2="640" y2="145" stroke="#5b21b6" stroke-width="0.6" opacity="0.18"/>
  <line x1="640" y1="145" x2="680" y2="130" stroke="#5b21b6" stroke-width="0.6" opacity="0.16"/>
  <line x1="470" y1="175" x2="460" y2="135" stroke="#4c1d95" stroke-width="0.5" opacity="0.18"/>
  <line x1="515" y1="170" x2="510" y2="128" stroke="#4c1d95" stroke-width="0.5" opacity="0.18"/>
  <line x1="560" y1="180" x2="555" y2="140" stroke="#4c1d95" stroke-width="0.5" opacity="0.16"/>
  <line x1="605" y1="172" x2="600" y2="130" stroke="#4c1d95" stroke-width="0.5" opacity="0.16"/>
  <line x1="648" y1="182" x2="640" y2="145" stroke="#4c1d95" stroke-width="0.5" opacity="0.15"/>
  <!-- cross connections -->
  <line x1="530" y1="95"  x2="510" y2="128" stroke="#4c1d95" stroke-width="0.5" opacity="0.15"/>
  <line x1="570" y1="80"  x2="555" y2="140" stroke="#4c1d95" stroke-width="0.5" opacity="0.14"/>
  <line x1="470" y1="175" x2="515" y2="170" stroke="#3b0764" stroke-width="0.5" opacity="0.15"/>
  <line x1="515" y1="170" x2="560" y2="180" stroke="#3b0764" stroke-width="0.5" opacity="0.15"/>
  <line x1="560" y1="180" x2="605" y2="172" stroke="#3b0764" stroke-width="0.5" opacity="0.14"/>
  <line x1="605" y1="172" x2="648" y2="182" stroke="#3b0764" stroke-width="0.5" opacity="0.13"/>

  <text x="580" y="225" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#7c3aed" opacity="0.8">~200k tokens/day</text>
  <text x="580" y="242" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#5b21b6" opacity="0.5">9 agents · 6 nodes · 4am cron</text>

  <!-- Caption -->
  <text x="400" y="268" text-anchor="middle"
        font-family="'Helvetica Neue', 'Inter', Arial, sans-serif"
        font-size="10" fill="#4c1d95" letter-spacing="2" opacity="0.55">积微成著</text>
</svg>
