<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- 标题 -->
  <text x="600" y="50" font-size="24" text-anchor="middle" fill="#cbd5e1" font-weight="bold">多源 Fallback 架构</text>
  <text x="600" y="80" font-size="14" text-anchor="middle" fill="#94a3b8">一个源失败 = 自动切换到下一个</text>

  <!-- 四个市场数据源 -->
  <g id="market-1-us">
    <rect x="50" y="130" width="250" height="450" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="8"/>
    <text x="175" y="165" font-size="14" text-anchor="middle" fill="#60a5fa" font-weight="bold">美股/期货</text>
    
    <!-- 优先级链 -->
    <rect x="70" y="200" width="210" height="50" fill="#1e40af" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="175" y="210" font-size="12" text-anchor="middle" fill="#60a5fa" font-weight="bold">Layer 1</text>
    <text x="175" y="230" font-size="10" text-anchor="middle" fill="#bfdbfe">yfinance</text>

    <text x="175" y="275" font-size="11" text-anchor="middle" fill="#94a3b8">↓ 失败</text>

    <rect x="70" y="290" width="210" height="50" fill="#0c2340" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="175" y="300" font-size="12" text-anchor="middle" fill="#60a5fa" font-weight="bold">Layer 2</text>
    <text x="175" y="320" font-size="10" text-anchor="middle" fill="#60a5fa">AkShare</text>

    <text x="175" y="365" font-size="11" text-anchor="middle" fill="#94a3b8">↓ 失败</text>

    <rect x="70" y="380" width="210" height="50" fill="#0c2340" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="175" y="390" font-size="12" text-anchor="middle" fill="#60a5fa" font-weight="bold">Layer 3</text>
    <text x="175" y="410" font-size="10" text-anchor="middle" fill="#60a5fa">Cache</text>

    <text x="175" y="475" font-size="11" text-anchor="middle" fill="#4ade80" font-weight="bold">&lt;3s P99</text>
  </g>

  <!-- 市场 2：A股 -->
  <g id="market-2-cn">
    <rect x="325" y="130" width="250" height="450" fill="#1e293b" stroke="#f97316" stroke-width="2" rx="8"/>
    <text x="450" y="165" font-size="14" text-anchor="middle" fill="#fb923c" font-weight="bold">A股/港股</text>
    
    <rect x="345" y="200" width="210" height="50" fill="#7c2d12" stroke="#f97316" stroke-width="1" rx="4"/>
    <text x="450" y="210" font-size="12" text-anchor="middle" fill="#fb923c" font-weight="bold">Layer 1</text>
    <text x="450" y="230" font-size="10" text-anchor="middle" fill="#fed7aa">EastMoney</text>

    <text x="450" y="275" font-size="11" text-anchor="middle" fill="#94a3b8">↓ 失败</text>

    <rect x="345" y="290" width="210" height="50" fill="#5a1e08" stroke="#f97316" stroke-width="1" rx="4"/>
    <text x="450" y="300" font-size="12" text-anchor="middle" fill="#fb923c" font-weight="bold">Layer 2</text>
    <text x="450" y="320" font-size="10" text-anchor="middle" fill="#fb923c">Sina</text>

    <text x="450" y="365" font-size="11" text-anchor="middle" fill="#94a3b8">↓ 失败</text>

    <rect x="345" y="380" width="210" height="50" fill="#5a1e08" stroke="#f97316" stroke-width="1" rx="4"/>
    <text x="450" y="390" font-size="12" text-anchor="middle" fill="#fb923c" font-weight="bold">Layer 3</text>
    <text x="450" y="410" font-size="10" text-anchor="middle" fill="#fb923c">QT Protocol</text>

    <text x="450" y="475" font-size="11" text-anchor="middle" fill="#4ade80" font-weight="bold">&lt;2s P99</text>
  </g>

  <!-- 市场 3：加密 -->
  <g id="market-3-crypto">
    <rect x="600" y="130" width="250" height="450" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="8"/>
    <text x="725" y="165" font-size="14" text-anchor="middle" fill="#c084fc" font-weight="bold">加密资产</text>
    
    <rect x="620" y="200" width="210" height="50" fill="#581c87" stroke="#a855f7" stroke-width="1" rx="4"/>
    <text x="725" y="210" font-size="12" text-anchor="middle" fill="#c084fc" font-weight="bold">Layer 1</text>
    <text x="725" y="230" font-size="10" text-anchor="middle" fill="#d8b4fe">yfinance</text>

    <text x="725" y="275" font-size="11" text-anchor="middle" fill="#94a3b8">↓ 失败</text>

    <rect x="620" y="290" width="210" height="50" fill="#3f0f63" stroke="#a855f7" stroke-width="1" rx="4"/>
    <text x="725" y="300" font-size="12" text-anchor="middle" fill="#c084fc" font-weight="bold">Layer 2</text>
    <text x="725" y="320" font-size="10" text-anchor="middle" fill="#a855f7">Binance</text>

    <text x="725" y="365" font-size="11" text-anchor="middle" fill="#94a3b8">↓ 失败</text>

    <rect x="620" y="380" width="210" height="50" fill="#3f0f63" stroke="#a855f7" stroke-width="1" rx="4"/>
    <text x="725" y="390" font-size="12" text-anchor="middle" fill="#c084fc" font-weight="bold">Layer 3</text>
    <text x="725" y="410" font-size="10" text-anchor="middle" fill="#a855f7">Cache</text>

    <text x="725" y="475" font-size="11" text-anchor="middle" fill="#4ade80" font-weight="bold">&lt;2s P99</text>
  </g>

  <!-- 市场 4：外汇 -->
  <g id="market-4-fx">
    <rect x="875" y="130" width="250" height="450" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="1000" y="165" font-size="14" text-anchor="middle" fill="#4ade80" font-weight="bold">外汇</text>
    
    <rect x="895" y="200" width="210" height="50" fill="#15803d" stroke="#22c55e" stroke-width="1" rx="4"/>
    <text x="1000" y="210" font-size="12" text-anchor="middle" fill="#4ade80" font-weight="bold">Layer 1</text>
    <text x="1000" y="230" font-size="10" text-anchor="middle" fill="#86efac">yfinance</text>

    <text x="1000" y="275" font-size="11" text-anchor="middle" fill="#94a3b8">↓ 失败</text>

    <rect x="895" y="290" width="210" height="50" fill="#0d4d23" stroke="#22c55e" stroke-width="1" rx="4"/>
    <text x="1000" y="300" font-size="12" text-anchor="middle" fill="#4ade80" font-weight="bold">Layer 2</text>
    <text x="1000" y="320" font-size="10" text-anchor="middle" fill="#22c55e">Sina</text>

    <text x="1000" y="365" font-size="11" text-anchor="middle" fill="#94a3b8">↓ 失败</text>

    <rect x="895" y="380" width="210" height="50" fill="#0d4d23" stroke="#22c55e" stroke-width="1" rx="4"/>
    <text x="1000" y="390" font-size="12" text-anchor="middle" fill="#4ade80" font-weight="bold">Layer 3</text>
    <text x="1000" y="410" font-size="10" text-anchor="middle" fill="#22c55e">Cache</text>

    <text x="1000" y="475" font-size="11" text-anchor="middle" fill="#4ade80" font-weight="bold">&lt;3s P99</text>
  </g>
</svg>