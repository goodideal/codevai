<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="500" fill="#0f172a"/>
  <text x="500" y="40" font-size="32" text-anchor="middle" fill="#60a5fa" font-weight="bold">Fallback Layers</text>
  <rect x="100" y="100" width="200" height="80" fill="#1e40af" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="200" y="145" font-size="16" text-anchor="middle" fill="#60a5fa" font-weight="bold">Layer 1</text>
  <text x="200" y="165" font-size="12" text-anchor="middle" fill="#bfdbfe">Primary Source</text>
  <rect x="350" y="100" width="200" height="80" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="450" y="145" font-size="16" text-anchor="middle" fill="#60a5fa" font-weight="bold">Layer 2</text>
  <text x="450" y="165" font-size="12" text-anchor="middle" fill="#bfdbfe">Fallback Source</text>
  <rect x="600" y="100" width="200" height="80" fill="#0c2340" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="700" y="145" font-size="16" text-anchor="middle" fill="#60a5fa" font-weight="bold">Layer 3</text>
  <text x="700" y="165" font-size="12" text-anchor="middle" fill="#bfdbfe">Cache/Retry</text>
  <path d="M 300 140 L 350 140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 550 140 L 600 140" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="200" y="280" width="600" height="150" fill="#1e293b" stroke="#475569" stroke-width="2" rx="8"/>
  <text x="500" y="310" font-size="16" text-anchor="middle" fill="#cbd5e1" font-weight="bold">Reliable System = No Single Point of Failure</text>
  <text x="500" y="340" font-size="13" text-anchor="middle" fill="#94a3b8">Multiple sources, intelligent retry, graceful degradation</text>
  <text x="500" y="365" font-size="13" text-anchor="middle" fill="#94a3b8">When one fails, system automatically tries the next</text>
  <text x="500" y="390" font-size="13" text-anchor="middle" fill="#94a3b8">Users never see the chaos underneath</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>
</svg>