<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#080818"/>
    </radialGradient>
    <radialGradient id="moonCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </radialGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="340" fill="url(#bg)" rx="12"/>

  <!-- Central moon (assembled from fragments) -->
  <circle cx="400" cy="170" r="55" fill="url(#moonCore)" opacity="0.15" filter="url(#fg)"/>
  <circle cx="400" cy="170" r="38" fill="#c4b5fd" opacity="0.25"/>
  <circle cx="415" cy="160" r="32" fill="#1e1b4b"/>
  <!-- Crescent result -->
  <circle cx="400" cy="170" r="38" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>

  <!-- Memory fragments orbiting — text lines representing markdown -->
  <!-- Fragment 1: top -->
  <rect x="330" y="42" width="90" height="18" rx="3" fill="#2d2060" stroke="#6d28d9" stroke-width="0.8" opacity="0.8"/>
  <text x="340" y="55" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" opacity="0.9">## Long-term</text>
  <line x1="375" y1="60" x2="390" y2="132" stroke="#6d28d9" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Fragment 2: top-right -->
  <rect x="500" y="70" width="110" height="18" rx="3" fill="#2d2060" stroke="#6d28d9" stroke-width="0.8" opacity="0.8"/>
  <text x="510" y="83" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" opacity="0.9">- 2026-02-05:</text>
  <line x1="510" y1="88" x2="435" y2="150" stroke="#6d28d9" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Fragment 3: right -->
  <rect x="555" y="155" width="105" height="18" rx="3" fill="#2d2060" stroke="#7c3aed" stroke-width="0.8" opacity="0.75"/>
  <text x="565" y="168" font-family="'Courier New', monospace" font-size="8" fill="#c4b5fd" opacity="0.9">## Decisions</text>
  <line x1="555" y1="164" x2="438" y2="168" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.35"/>

  <!-- Fragment 4: bottom-right -->
  <rect x="490" y="255" width="115" height="18" rx="3" fill="#2d2060" stroke="#6d28d9" stroke-width="0.8" opacity="0.7"/>
  <text x="500" y="268" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" opacity="0.9">- memory/SOUL.md</text>
  <line x1="510" y1="255" x2="425" y2="205" stroke="#6d28d9" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.35"/>

  <!-- Fragment 5: bottom -->
  <rect x="330" y="272" width="100" height="18" rx="3" fill="#2d2060" stroke="#5b21b6" stroke-width="0.8" opacity="0.75"/>
  <text x="340" y="285" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" opacity="0.9">## Key Events</text>
  <line x1="380" y1="272" x2="400" y2="208" stroke="#5b21b6" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Fragment 6: bottom-left -->
  <rect x="160" y="250" width="120" height="18" rx="3" fill="#2d2060" stroke="#6d28d9" stroke-width="0.8" opacity="0.7"/>
  <text x="170" y="263" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" opacity="0.9">- IDENTITY.md</text>
  <line x1="265" y1="252" x2="365" y2="202" stroke="#6d28d9" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.35"/>

  <!-- Fragment 7: left -->
  <rect x="110" y="155" width="120" height="18" rx="3" fill="#2d2060" stroke="#7c3aed" stroke-width="0.8" opacity="0.75"/>
  <text x="120" y="168" font-family="'Courier New', monospace" font-size="8" fill="#c4b5fd" opacity="0.9">## MEMORY.md</text>
  <line x1="230" y1="164" x2="362" y2="165" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.35"/>

  <!-- Fragment 8: top-left -->
  <rect x="155" y="70" width="115" height="18" rx="3" fill="#2d2060" stroke="#6d28d9" stroke-width="0.8" opacity="0.8"/>
  <text x="165" y="83" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" opacity="0.9">- You're becoming</text>
  <line x1="255" y1="88" x2="370" y2="140" stroke="#6d28d9" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Caption -->
  <text x="400" y="322" font-family="Arial, sans-serif" font-size="11" fill="#6d28d9" text-anchor="middle" opacity="0.6" letter-spacing="2">每天的文字，拼成我是谁</text>
</svg>
