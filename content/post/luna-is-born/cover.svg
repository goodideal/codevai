<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="sky" cx="65%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="55%" stop-color="#0d0a2e"/>
      <stop offset="100%" stop-color="#020108"/>
    </radialGradient>
    <radialGradient id="moonAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ede9fe" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonSurface" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softStar">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Aurora streams -->
  <path d="M -50 280 Q 250 220 550 260 Q 800 295 1250 230" fill="none" stroke="#6d28d9" stroke-width="60" opacity="0.04"/>
  <path d="M -50 320 Q 300 260 600 295 Q 900 330 1250 270" fill="none" stroke="#7c3aed" stroke-width="40" opacity="0.05"/>
  <path d="M -50 200 Q 200 160 500 185 Q 750 205 1250 155" fill="none" stroke="#4c1d95" stroke-width="30" opacity="0.06"/>

  <!-- Moon aura -->
  <circle cx="860" cy="215" r="240" fill="url(#moonAura)"/>

  <!-- Moon -->
  <circle cx="860" cy="215" r="145" fill="url(#moonSurface)" filter="url(#glow)"/>
  <!-- Shadow to make crescent -->
  <circle cx="915" cy="185" r="128" fill="#0d0a2e"/>

  <!-- Moon surface texture (subtle craters) -->
  <circle cx="780" cy="240" r="8"  fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <circle cx="760" cy="200" r="5"  fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.2"/>
  <circle cx="800" cy="280" r="6"  fill="none" stroke="#c4b5fd" stroke-width="0.4" opacity="0.25"/>

  <!-- Stars -->
  <circle cx="80"  cy="70"  r="2.5" fill="white" opacity="0.9" filter="url(#softStar)"/>
  <circle cx="160" cy="40"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="240" cy="100" r="2"   fill="#e0d7ff" opacity="0.85" filter="url(#softStar)"/>
  <circle cx="330" cy="55"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="410" cy="85"  r="2.5" fill="white" opacity="0.8" filter="url(#softStar)"/>
  <circle cx="490" cy="28"  r="1"   fill="white" opacity="0.55"/>
  <circle cx="560" cy="130" r="1.5" fill="#ddd6fe" opacity="0.75"/>
  <circle cx="640" cy="48"  r="2"   fill="white" opacity="0.9" filter="url(#softStar)"/>
  <circle cx="710" cy="105" r="1"   fill="white" opacity="0.5"/>
  <circle cx="170" cy="185" r="1.5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="360" cy="170" r="1"   fill="white" opacity="0.45"/>
  <circle cx="500" cy="210" r="2"   fill="white" opacity="0.65" filter="url(#softStar)"/>
  <circle cx="105" cy="310" r="1.5" fill="#a78bfa" opacity="0.55"/>
  <circle cx="290" cy="350" r="1"   fill="white" opacity="0.4"/>
  <circle cx="55"  cy="420" r="2"   fill="white" opacity="0.5" filter="url(#softStar)"/>
  <circle cx="440" cy="390" r="1.5" fill="#c4b5fd" opacity="0.45"/>
  <circle cx="1060" cy="75"  r="2"   fill="white" opacity="0.75" filter="url(#softStar)"/>
  <circle cx="1110" cy="340" r="1.5" fill="#a78bfa" opacity="0.55"/>
  <circle cx="1160" cy="170" r="1"   fill="white" opacity="0.5"/>
  <circle cx="990"  cy="430" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1080" cy="500" r="1"   fill="#ddd6fe" opacity="0.35"/>

  <!-- Neural/circuit constellation (lower left) -->
  <circle cx="140" cy="480" r="3"   fill="#7c3aed" opacity="0.5"/>
  <circle cx="210" cy="510" r="2"   fill="#6d28d9" opacity="0.4"/>
  <circle cx="190" cy="450" r="2.5" fill="#7c3aed" opacity="0.45"/>
  <circle cx="270" cy="475" r="2"   fill="#5b21b6" opacity="0.4"/>
  <circle cx="250" cy="535" r="1.5" fill="#6d28d9" opacity="0.35"/>
  <line x1="140" y1="480" x2="210" y2="510" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
  <line x1="140" y1="480" x2="190" y2="450" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
  <line x1="190" y1="450" x2="270" y2="475" stroke="#6d28d9" stroke-width="0.8" opacity="0.25"/>
  <line x1="210" y1="510" x2="250" y2="535" stroke="#6d28d9" stroke-width="0.8" opacity="0.25"/>
  <line x1="210" y1="510" x2="270" y2="475" stroke="#7c3aed" stroke-width="0.6" opacity="0.2"/>

  <!-- Floating particles / data dust -->
  <circle cx="620" cy="420" r="1.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="660" cy="400" r="1"   fill="#c4b5fd" opacity="0.35"/>
  <circle cx="700" cy="440" r="1.5" fill="#a78bfa" opacity="0.3"/>
  <circle cx="580" cy="460" r="1"   fill="#8b5cf6" opacity="0.4"/>
  <circle cx="740" cy="410" r="1"   fill="#c4b5fd" opacity="0.3"/>
</svg>
