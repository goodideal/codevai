<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="600" fill="#0f172a"/>
  <text x="500" y="40" font-size="32" text-anchor="middle" fill="#dc2626" font-weight="bold">安全审计检查清单</text>
  <g id="check-1">
    <rect x="50" y="80" width="420" height="100" fill="#1e293b" stroke="#dc2626" stroke-width="2" rx="8"/>
    <text x="260" y="110" font-size="16" text-anchor="middle" fill="#dc2626" font-weight="bold">🔴 环境变量泄露</text>
    <text x="260" y="135" font-size="12" text-anchor="middle" fill="#cbd5e1">凭证不应该在日志中打印</text>
    <text x="260" y="155" font-size="12" text-anchor="middle" fill="#94a3b8">grep 日志、审查 console.log</text>
  </g>
  <g id="check-2">
    <rect x="530" y="80" width="420" height="100" fill="#1e293b" stroke="#dc2626" stroke-width="2" rx="8"/>
    <text x="740" y="110" font-size="16" text-anchor="middle" fill="#dc2626" font-weight="bold">🔴 硬编码凭证</text>
    <text x="740" y="135" font-size="12" text-anchor="middle" fill="#cbd5e1">秘密不应该在源代码里</text>
    <text x="740" y="155" font-size="12" text-anchor="middle" fill="#94a3b8">grep 源码、检查 Git 历史</text>
  </g>
  <g id="check-3">
    <rect x="50" y="210" width="420" height="100" fill="#1e293b" stroke="#ea580c" stroke-width="2" rx="8"/>
    <text x="260" y="240" font-size="16" text-anchor="middle" fill="#ea580c" font-weight="bold">🟠 网络暴露</text>
    <text x="260" y="265" font-size="12" text-anchor="middle" fill="#cbd5e1">Gateway 不应该暴露给外网</text>
    <text x="260" y="285" font-size="12" text-anchor="middle" fill="#94a3b8">netstat -tlnp、防火墙规则</text>
  </g>
  <g id="check-4">
    <rect x="530" y="210" width="420" height="100" fill="#1e293b" stroke="#eab308" stroke-width="2" rx="8"/>
    <text x="740" y="240" font-size="16" text-anchor="middle" fill="#eab308" font-weight="bold">🟡 权限通配符</text>
    <text x="740" y="265" font-size="12" text-anchor="middle" fill="#cbd5e1">显式允许列表 &gt; 通配符</text>
    <text x="740" y="285" font-size="12" text-anchor="middle" fill="#94a3b8">审查配置文件、移除 ["*"]</text>
  </g>
  <g id="fix-process">
    <rect x="100" y="360" width="800" height="200" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="500" y="390" font-size="18" text-anchor="middle" fill="#22c55e" font-weight="bold">✅ 修复流程</text>
    <text x="130" y="425" font-size="12" fill="#cbd5e1" font-weight="bold">Step 1: 发现</text>
    <text x="130" y="445" font-size="11" fill="#94a3b8">自动扫描 + 人工审视</text>
    <text x="380" y="425" font-size="12" fill="#cbd5e1" font-weight="bold">Step 2: 评估</text>
    <text x="380" y="445" font-size="11" fill="#94a3b8">风险分类 (CVSS)</text>
    <text x="630" y="425" font-size="12" fill="#cbd5e1" font-weight="bold">Step 3: 修复</text>
    <text x="630" y="445" font-size="11" fill="#94a3b8">优先级排序 + 验证</text>
    <text x="500" y="510" font-size="13" text-anchor="middle" fill="#cbd5e1">小事情，大回报：定期审计能避免致命漏洞</text>
    <text x="500" y="535" font-size="12" text-anchor="middle" fill="#94a3b8">安全不是"完全隐藏"，而是"分层防护"</text>
  </g>
</svg>