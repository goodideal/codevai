<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <clipPath id="phone-clip">
      <rect x="280" y="30" width="340" height="420" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0a0d14"/>

  <!-- Top caption -->
  <text x="450" y="20" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#374151" letter-spacing="2">一次"简单"确认的三分钟地狱</text>

  <!-- Phone outer shadow -->
  <rect x="277" y="27" width="346" height="430" rx="24" fill="#0d1117" opacity="0.6"/>

  <!-- Phone frame -->
  <rect x="280" y="30" width="340" height="424" rx="22" fill="#161b27" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Status bar -->
  <rect x="280" y="30" width="340" height="26" rx="22" fill="#1c2333"/>
  <rect x="280" y="46" width="340" height="10" fill="#1c2333"/>
  <text x="450" y="44" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#6b7280">9:41</text>

  <!-- Chat header -->
  <rect x="280" y="56" width="340" height="48" fill="#1e2640"/>
  <circle cx="312" cy="80" r="13" fill="#2d3748"/>
  <text x="312" y="84" text-anchor="middle" font-size="12">🤖</text>
  <text x="332" y="76" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="600" fill="#e2e8f0">CoDevAI Bot</text>
  <text x="332" y="91" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#48bb78">● 在线</text>

  <!-- Chat body background -->
  <rect x="280" y="104" width="340" height="306" fill="#0f1923"/>

  <!-- System message: initial prompt -->
  <rect x="288" y="114" width="228" height="38" rx="10" fill="#1e2d3d"/>
  <text x="300" y="129" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#94a3b8">⚠️ 确认删除操作</text>
  <text x="300" y="146" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" fill="#475569">请输入 yes 确认（47GB 数据）</text>

  <!-- === Exchange 1: yse === -->
  <!-- User bubble: yse (confident blue) -->
  <rect x="456" y="164" width="54" height="28" rx="13" fill="#2563eb"/>
  <text x="483" y="182" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13" fill="white" font-weight="bold">yse</text>
  <text x="456" y="198" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="8" fill="#374151">14:01</text>

  <!-- System error 1 -->
  <rect x="288" y="205" width="200" height="26" rx="10" fill="#1e2d3d"/>
  <text x="300" y="222" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#f87171">❌ 确认码错误，请重试</text>

  <!-- === Exchange 2: YES === -->
  <!-- User bubble: YES (slightly annoyed blue) -->
  <rect x="450" y="242" width="62" height="28" rx="13" fill="#1d4ed8"/>
  <text x="481" y="260" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13" fill="#dbeafe" font-weight="bold">YES</text>
  <text x="450" y="276" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="8" fill="#374151">14:02</text>

  <!-- System error 2 -->
  <rect x="288" y="283" width="216" height="26" rx="10" fill="#1e2d3d"/>
  <text x="300" y="300" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#f87171">❌ 请输入小写 yes</text>

  <!-- === Exchange 3: fuck (RAGE RED) === -->
  <!-- User bubble: fuck (angry red) -->
  <rect x="440" y="320" width="72" height="28" rx="13" fill="#991b1b"/>
  <text x="476" y="338" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13" fill="#fecaca" font-weight="bold">fuck</text>
  <text x="440" y="354" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="8" fill="#374151">14:04</text>

  <!-- System error 3: still calm, infuriating -->
  <rect x="288" y="361" width="234" height="26" rx="10" fill="#1e2d3d"/>
  <text x="300" y="378" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#f87171">❌ 确认码错误，请重新输入</text>

  <!-- Bottom input bar (phone) -->
  <rect x="280" y="410" width="340" height="44" fill="#161b27"/>
  <rect x="280" y="410" width="340" height="6" fill="#1c2333"/>
  <rect x="293" y="420" width="260" height="24" rx="12" fill="#1e2640" stroke="#2d3748" stroke-width="1"/>
  <text x="423" y="436" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#374151">发送消息...</text>

  <!-- === Outside labels (left) === -->
  <text x="268" y="182" text-anchor="end"
        font-family="'Courier New', monospace" font-size="11" fill="#3b82f6">① typo</text>
  <text x="268" y="260" text-anchor="end"
        font-family="'Courier New', monospace" font-size="11" fill="#3b82f6">② 大写</text>
  <text x="268" y="338" text-anchor="end"
        font-family="'Courier New', monospace" font-size="11" fill="#ef4444">③ 崩溃</text>

  <!-- === Outside labels (right) === -->
  <text x="624" y="176" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#6b7280">手滑打错了</text>
  <text x="624" y="254" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#6b7280">改大写了</text>
  <text x="624" y="334" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#9b1c1c">彻底放弃</text>

  <!-- Bottom facepalm emoji -->
  <text x="450" y="474" text-anchor="middle" font-size="30">🤦</text>
  <text x="450" y="496" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#4b5563" letter-spacing="1">三分钟后，他愤怒地敲下了 fuck</text>
</svg>
