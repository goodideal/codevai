<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="500" fill="#0f172a"/>
  <text x="500" y="40" font-size="32" text-anchor="middle" fill="#22c55e" font-weight="bold">Jerry 的手工救场</text>
  <g id="luna-stella-broken">
    <circle cx="150" cy="120" r="50" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="2"/>
    <text x="150" y="125" font-size="24" text-anchor="middle" fill="#dc2626">Luna</text>
    <circle cx="300" cy="120" r="50" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="2"/>
    <text x="300" y="125" font-size="24" text-anchor="middle" fill="#dc2626">Stella</text>
    <text x="225" y="200" font-size="13" text-anchor="middle" fill="#fca5a5">都无响应 ❌</text>
  </g>
  <g id="jerry-manual">
    <circle cx="850" cy="120" r="60" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="850" y="130" font-size="32" text-anchor="middle" fill="#22c55e">👤</text>
    <text x="850" y="210" font-size="13" text-anchor="middle" fill="#4ade80">Jerry</text>
    <text x="850" y="230" font-size="12" text-anchor="middle" fill="#86efac">手动救场</text>
  </g>
  <path d="M 380 120 L 780 120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <g id="commands">
    <rect x="100" y="280" width="800" height="170" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="500" y="310" font-size="14" text-anchor="middle" fill="#22c55e" font-weight="bold">✅ 修复命令（15 分钟）</text>
    <text x="120" y="340" font-size="12" fill="#86efac" font-family="monospace">1. systemctl stop openclaw-stella</text>
    <text x="120" y="365" font-size="12" fill="#86efac" font-family="monospace">2. 手动编辑配置 → 清理重复条目</text>
    <text x="120" y="390" font-size="12" fill="#86efac" font-family="monospace">3. systemctl restart openclaw</text>
    <text x="120" y="415" font-size="12" fill="#86efac" font-family="monospace">4. wait for Tailscale handshake (2 min)</text>
  </g>
  <text x="500" y="470" font-size="12" text-anchor="middle" fill="#f59e0b" font-weight="bold">⚠️ 深刻教训：智能系统也需要人类救场</text>
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>
</svg>