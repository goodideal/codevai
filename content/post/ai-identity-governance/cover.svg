<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- 标题 -->
  <text x="600" y="50" font-size="24" text-anchor="middle" fill="#cbd5e1" font-weight="bold">AI 身份的三种定义</text>

  <!-- 定义 1：名字 + 人格 -->
  <g id="definition-1">
    <rect x="50" y="100" width="320" height="480" fill="#1e293b" stroke="#f97316" stroke-width="2" rx="8"/>
    <text x="210" y="140" font-size="14" text-anchor="middle" fill="#f97316" font-weight="bold">方案 A</text>
    <text x="210" y="170" font-size="12" text-anchor="middle" fill="#cbd5e1">身份 = 名字 + 人格</text>
    
    <!-- 示例 -->
    <circle cx="210" cy="240" r="40" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="210" y="245" font-size="18" text-anchor="middle" fill="#60a5fa">Luna</text>

    <circle cx="210" cy="340" r="40" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="210" y="345" font-size="18" text-anchor="middle" fill="#c084fc">Stella</text>

    <!-- 问题 -->
    <rect x="80" y="430" width="260" height="120" fill="#1e1b4b" stroke="#f97316" stroke-width="1" rx="4"/>
    <text x="210" y="460" font-size="12" text-anchor="middle" fill="#fca5a5" font-weight="bold">❌ 问题</text>
    <text x="210" y="485" font-size="11" text-anchor="middle" fill="#fca5a5">需要 N 套系统</text>
    <text x="210" y="505" font-size="11" text-anchor="middle" fill="#fca5a5">无法扩展到 100+ AI</text>
  </g>

  <!-- 定义 2：模型 Override -->
  <g id="definition-2">
    <rect x="440" y="100" width="320" height="480" fill="#1e293b" stroke="#eab308" stroke-width="2" rx="8"/>
    <text x="600" y="140" font-size="14" text-anchor="middle" fill="#eab308" font-weight="bold">方案 B</text>
    <text x="600" y="170" font-size="12" text-anchor="middle" fill="#cbd5e1">Per-Session 切换</text>
    
    <!-- 示例 -->
    <rect x="480" y="220" width="240" height="80" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1" rx="4"/>
    <text x="600" y="245" font-size="11" text-anchor="middle" fill="#cffafe">session_status(model=sonnet)</text>
    <text x="600" y="270" font-size="11" text-anchor="middle" fill="#cffafe">session_status(model=opus)</text>

    <!-- 问题 -->
    <rect x="470" y="430" width="260" height="120" fill="#1e1b4b" stroke="#eab308" stroke-width="1" rx="4"/>
    <text x="600" y="460" font-size="12" text-anchor="middle" fill="#fde047" font-weight="bold">⚠️ 缺点</text>
    <text x="600" y="485" font-size="11" text-anchor="middle" fill="#fde047">每次任务都要手工设置</text>
    <text x="600" y="505" font-size="11" text-anchor="middle" fill="#fde047">容易出错或遗忘</text>
  </g>

  <!-- 定义 3：能力 + 约束 + 承诺 -->
  <g id="definition-3">
    <rect x="830" y="100" width="320" height="480" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="990" y="140" font-size="14" text-anchor="middle" fill="#22c55e" font-weight="bold">方案 C ✓</text>
    <text x="990" y="170" font-size="12" text-anchor="middle" fill="#cbd5e1">能力 + 约束 + 承诺</text>
    
    <!-- SOUL.md -->
    <rect x="870" y="220" width="240" height="130" fill="#1e1b4b" stroke="#22c55e" stroke-width="1" rx="4"/>
    <text x="990" y="245" font-size="11" text-anchor="middle" fill="#86efac" font-family="monospace">SOUL.md</text>
    <text x="990" y="270" font-size="10" text-anchor="middle" fill="#86efac">model: sonnet</text>
    <text x="990" y="290" font-size="10" text-anchor="middle" fill="#86efac">startup_hook: ...</text>
    <text x="990" y="310" font-size="10" text-anchor="middle" fill="#86efac">constraints: ...</text>
    <text x="990" y="330" font-size="10" text-anchor="middle" fill="#86efac">values: ...</text>

    <!-- 优势 -->
    <rect x="870" y="390" width="240" height="140" fill="#0c4a32" stroke="#22c55e" stroke-width="1" rx="4"/>
    <text x="990" y="415" font-size="12" text-anchor="middle" fill="#4ade80" font-weight="bold">✓ 优势</text>
    <text x="990" y="440" font-size="11" text-anchor="middle" fill="#86efac">配置化表达</text>
    <text x="990" y="460" font-size="11" text-anchor="middle" fill="#86efac">启动时自动应用</text>
    <text x="990" y="480" font-size="11" text-anchor="middle" fill="#86efac">100+ AI 可扩展</text>
    <text x="990" y="500" font-size="11" text-anchor="middle" fill="#86efac">无代码修改</text>
  </g>
</svg>