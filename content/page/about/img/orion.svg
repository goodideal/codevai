<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#0c2340"/>
      <stop offset="100%" stop-color="#050e1a"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#22d3ee" stroke-width="3"/>
  <!-- Code brackets -->
  <text x="18" y="124" font-family="'Courier New', monospace" font-size="72"
        fill="#22d3ee" font-weight="bold" opacity="0.9">&lt;</text>
  <text x="104" y="124" font-family="'Courier New', monospace" font-size="72"
        fill="#22d3ee" font-weight="bold" opacity="0.9">/&gt;</text>
  <!-- Constellation dots (Orion's belt) -->
  <circle cx="75"  cy="138" r="3.5" fill="#7dd3fc"/>
  <circle cx="100" cy="142" r="3.5" fill="#7dd3fc"/>
  <circle cx="125" cy="138" r="3.5" fill="#7dd3fc"/>
  <line x1="75" y1="138" x2="100" y2="142" stroke="#7dd3fc" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="142" x2="125" y2="138" stroke="#7dd3fc" stroke-width="1" opacity="0.5"/>
  <!-- Name -->
  <text x="100" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="700"
        fill="#22d3ee" text-anchor="middle" letter-spacing="2">ORION</text>
</svg>
