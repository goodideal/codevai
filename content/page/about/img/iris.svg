<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a0a3e"/>
      <stop offset="100%" stop-color="#0f0518"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#e879f9" stroke-width="3"/>
  <!-- Magnifying glass circle -->
  <circle cx="92" cy="88" r="36" fill="none" stroke="#e879f9" stroke-width="8"/>
  <circle cx="92" cy="88" r="26" fill="#4a0264" opacity="0.6"/>
  <!-- Check mark inside -->
  <polyline points="80,89 89,98 108,78" fill="none" stroke="#f0abfc" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Handle -->
  <line x1="120" y1="116" x2="146" y2="142" stroke="#e879f9" stroke-width="9"
        stroke-linecap="round"/>
  <!-- Name -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="700"
        fill="#e879f9" text-anchor="middle" letter-spacing="2">IRIS</text>
</svg>
